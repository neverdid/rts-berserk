name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  native-core:
    name: Native core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DASHEN_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
      - name: Upload deterministic self-play report
        uses: actions/upload-artifact@v4
        with:
          name: self-play-${{ matrix.os }}
          path: build/self-play-report.json
          if-no-files-found: error

  self-play-parity:
    name: Self-play report parity
    needs: native-core
    runs-on: ubuntu-latest
    steps:
      - name: Download platform reports
        uses: actions/download-artifact@v4
        with:
          pattern: self-play-*
          path: reports
      - name: Require byte-identical Windows and Linux reports
        run: >-
          cmp
          reports/self-play-ubuntu-latest/self-play-report.json
          reports/self-play-windows-latest/self-play-report.json

  native-sanitizers:
    name: Native sanitizers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure ASan and UBSan
        run: >-
          cmake -S . -B build/sanitize
          -DASHEN_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build/sanitize --parallel
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build/sanitize --output-on-failure
